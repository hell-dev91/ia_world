<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Sahim2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        body {
            background-color: #1a1a1a;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 400px;
            height: 550px;
            background: #2d2d2d;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(121, 162, 121, 0.867);
            color: #ffffff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .chat-body {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Style des bulles de message */
        .message {
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot { 
            background: #444; 
            color: burlywood; 
            align-self: flex-start; 
        }

        .user { 
            background: blueviolet; 
            color: white; 
            align-self: flex-end; 
        }

        .chat-footer {
            display: flex;
            padding: 15px;
            background: white;
            gap: 10px;
        }

        #userInput {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f9f9f9;
            color: black;
            outline: none;
        }

        #sendBtn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div class="chat-container">
        <div class="chat-header">
            <span>Al-sahim2.0</span>
            <button id="darkModeToggle" style="display:none;"></button>
        </div>
        
        <div class="chat-body" id="chatBody">
            <div class="message bot">Bonjour ! Comment puis-je t'aider aujourd'hui ?</div>
        </div>

        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Écris ton message...">
            <button id="sendBtn">Envoyer</button>
        </div>
    </div>

<script>
// 1. Sélection correcte des éléments selon leurs vrais IDs HTML
const chatBody = document.getElementById("chatBody");
const userInput = document.getElementById("userInput");
const sendButton = document.getElementById("sendBtn");

// 2. La fonction qui parle à l'IA
async function getResponse(userText) {
    // METS TA CLÉ GROQ ICI
    const apiKey = "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"; 
    const url = "https://api.groq.com/openai/v1/chat/completions";

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                // Correction ici : utilisation de la variable apiKey
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "user", content: userText }]
            })
        });

        const data = await response.json();
        
        if (data.error) {
            console.error("Erreur API:", data.error.message);
            return "Erreur API: " + data.error.message;
        }

        return data.choices[0].message.content; 
    } catch (error) {
        console.error("Erreur Fetch:", error);
        return "Impossible de contacter l'IA.";
    }
}

// 3. Logique d'envoi du message
async function handleSendMessage() {
    const text = userInput.value.trim();
    if (text === "") return;

    // Affiche ton message (à droite)
    chatBody.innerHTML += `<div class="message user"><b>Moi:</b> ${text}</div>`;
    userInput.value = "";

    // Affiche la bulle de chargement pour le Bot
    const tempId = "loading-" + Date.now();
    chatBody.innerHTML += `<div class="message bot" id="${tempId}"><i>L'IA réfléchit...</i></div>`;
    
    // Défilement vers le bas
    chatBody.scrollTop = chatBody.scrollHeight;

    // Appel de l'IA
    const aiReply = await getResponse(text);
    
    // Remplace le texte de chargement par la vraie réponse
    const loadingBubble = document.getElementById(tempId);
    if (loadingBubble) {
        loadingBubble.innerHTML = `<b>Al-sahim:</b> ${aiReply}`;
    }
    
    // Nouveau défilement vers le bas
    chatBody.scrollTop = chatBody.scrollHeight;
}

// Liaison des événements au clic et à la touche Entrée
sendButton.onclick = handleSendMessage;

userInput.addEventListener("keypress", (event) => {
    if (event.key === "Enter") {
        handleSendMessage();
    }
});
</script>
</body>
</html>
