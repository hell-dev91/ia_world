<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Sahim2.0</title>
    
</head>
<body>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
    </style>
    <div class="chat-container">
        <div class="chat-header">
            <span>Al-sahim2.0</span>
            <button id="darkModeToggle"></button>
        </div>
        
        <div class="chat-body" id="chatBody">
            <div class="message bot">Bonjour ! votre haltès Comment puis-je t'aider aujourd'hui ?</div>
        </div>

        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Écris ton message...">
            <button id="sendBtn">Envoyer</button>
        </div>
    </div>

   
<style>
body {
    background-color: #1a1a1a;
    font-family: 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.chat-container {
    width: 400px;
    height: 550px;
    background: #2d2d2d;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat-header {
    background: rgba(121, 162, 121, 0.867);
    color: rgb(189, 132, 132);
    padding: 15px;
    display: flex;
    justify-content: space-between;
    font-weight: bold;
}

.chat-body {
    flex-grow: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Style des bulles de message */
.message {
    padding: 10px 15px;
    border-radius: 12px;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.4;
}

.bot { 
    background: #444; 
    color: burlywood; 
    align-self: flex-start; 
}

.user { 
    background: blueviolet; 
    color: rgb(107, 38, 38); 
    align-self: flex-end; 
}

.chat-footer {
    display: flex;
    padding: 15px;
    background: white;
    gap: 10px;
}

#userInput {
    flex-grow: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: yellowgreen;
    color: black;
    outline: none;
}

#sendBtn {
    background: #007bff;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}</style>
<script>
 
// 1. Sélection des éléments
const chatBody = document.getElementById("chat_body");
const userInput = document.getElementById("chat_input");
const sendButton = document.getElementById("chat_button");

// 2. La fonction qui parle à l'IA
async function getResponse(userText) {
    const apiKey = "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"; // <--- METS TA CLÉ GROQ ICI
    const url = "https://api.groq.com/openai/v1/chat/completions";

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${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}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "user", content: userText }]
            })
        });

        const data = await response.json();
        
        // Vérification si l'API renvoie une erreur
        if (data.error) {
            console.error("Erreur API:", data.error.message);
            return "Erreur API: " + data.error.message;
        }

        return data.choices[0].message.content; 
    } catch (error) {
        console.error("Erreur Fetch:", error);
        return "Impossible de contacter l'IA.";
    }
}

// 3. Logique du bouton Envoyer
sendButton.onclick = async () => {
    const text = userInput.value;
    if (text.trim() === "") return;
// Permet d'envoyer le message avec la touche Entrée
userInput.addEventListener("keypress", (event) => {
    if (event.key === "Enter") {
        // Cela simule un clic sur le bouton envoyer
        sendButton.click();
    }
});

    // Affiche ton message (à droite)
    chatBody.innerHTML += `<div class="message user" style="align-self: flex-end; background: #dcf8c6; padding: 8px; margin: 5px; border-radius: 10px;"><b>Moi:</b> ${text}</div>`;
    userInput.value = "";

    // Affiche la bulle de chargement pour le Bot
    const tempId = "loading-" + Date.now();
    chatBody.innerHTML += `<div class="message bot" id="${tempId}" style="align-self: flex-start; background: #eee; padding: 8px; margin: 5px; border-radius: 10px;"><i>L'IA réfléchit...</i></div>`;
    
    // On fait défiler vers le bas
    chatBody.scrollTop = chatBody.scrollHeight;

    // Appel de l'IA
    const aiReply = await getResponse(text);
    
    // Remplace le "L'IA réfléchit" par la vraie réponse
    document.getElementById(tempId).innerHTML = `<b>Vague:</b> ${aiReply}`;
    
    // On refait défiler
    chatBody.scrollTop = chatBody.scrollHeight;
};
</script>
</body>
</html>
